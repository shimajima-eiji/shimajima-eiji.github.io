feeds:
  # connpass グループの subdomain を指定するだけで ICS が生成される。
  # API キー不要。{subdomain}.connpass.com/ja.atom を使う。
  #
  # 購読URL例: https://shimajima-eiji.github.io/{key}.ics

  - key: ospn
    name: "OSPN / OSC (connpass)"
    subdomain: "ospn"

  # 追加例:
