name: CI

on:
  pull_request:
  push:
    branches-ignore: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Byte-compile scripts
        run: python -m py_compile scripts/*.py

      - name: Validate docs/ and generation logic
        run: python scripts/validate.py
