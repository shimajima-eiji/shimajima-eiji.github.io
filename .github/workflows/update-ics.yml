name: Update ICS Feeds

on:
  workflow_dispatch:
  schedule:
    # connpass Atom フィードは API キー不要なので常時有効でよい。
    - cron: "0 0 * * *"  # JST 09:00 = UTC 00:00

permissions:
  contents: write
  issues: write

concurrency:
  group: update-ics-feeds
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate all ICS
        env:
          FEEDS_YML: feeds.yml
          OUT_DIR: docs
          # 未設定なら空文字 → スクリプトが Atom 方式に自動フォールバックする。
          CONNPASS_API_KEY: ${{ secrets.CONNPASS_API_KEY }}
        run: python scripts/generate_all_ics.py

      # 生成物を commit/push する前に必ず検証する。スケジュール実行は push 先が main で
      # CI(ci.yml) が起動しないため、ここで validate を挟まないと不正な ICS が
      # バリデーションを通らずに Pages へ公開されてしまう（PR の主目的に反する穴を塞ぐ）。
      - name: Validate generated artifacts
        run: python scripts/validate.py

      - name: Commit if changed
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add docs/*.ics docs/feeds.json
            git commit -m "Update ICS feeds"
            git push
          else
            echo "No changes."
          fi

      # 失敗通知はローカル composite action を使わず github-script を直接インラインで書く。
      # ローカル action 参照(uses: ./...)は checkout 失敗時にファイルが存在せずロードできず、
      # 「まさに通知したい checkout 失敗ケースで通知が飛ばない」ため(issue 指摘)。
      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = `⚠️ ワークフロー失敗: ${context.workflow}`;
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              `**${context.workflow}** が失敗しました。`,
              ``,
              `- 実行ログ: ${runUrl}`,
              `- イベント: \`${context.eventName}\``,
              `- 発生時刻: ${new Date().toISOString()}`,
            ].join("\n");
            const { owner, repo } = context.repo;
            const existing = await github.rest.issues.listForRepo({
              owner, repo, state: "open", labels: "ci-failure", per_page: 100,
            });
            const hit = existing.data.find((i) => i.title === title);
            if (hit) {
              await github.rest.issues.createComment({ owner, repo, issue_number: hit.number, body });
              core.notice(`Updated existing failure issue #${hit.number}`);
            } else {
              const created = await github.rest.issues.create({
                owner, repo, title, body, labels: ["ci-failure"],
              });
              core.notice(`Opened failure issue #${created.data.number}`);
            }
