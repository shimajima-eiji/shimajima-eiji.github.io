name: Update ICS Feeds

on:
  workflow_dispatch:
  schedule:
    # JST 09:00 = UTC 00:00
    - cron: "0 0 * * *"

permissions:
  contents: write

concurrency:
  group: update-ics-feeds
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate all ICS
        env:
          CONNPASS_API_KEY: ${{ secrets.CONNPASS_API_KEY }}
          FEEDS_YML: feeds.yml
          OUT_DIR: docs
          CONNPASS_RANGE_DAYS_AHEAD: "365"
          CONNPASS_RANGE_DAYS_BACK: "0"
          CONNPASS_COUNT: "100"
        run: python scripts/generate_all_ics.py

      - name: Commit if changed
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add docs/*.ics
            git commit -m "Update ICS feeds"
            git push
          else
            echo "No changes."
          fi
