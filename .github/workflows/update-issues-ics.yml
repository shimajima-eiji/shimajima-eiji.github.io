name: Update GitHub Issues ICS

on:
  workflow_dispatch:
  issues:
    types: [opened, edited, closed, reopened]
  schedule:
    # JST 09:00 = UTC 00:00
    - cron: "0 0 * * *"

permissions:
  contents: write
  issues: write

concurrency:
  group: update-issues-ics
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate Issues ICS
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          OUT_DIR: docs
          OUT_FILE: github-issues.ics
        run: python scripts/generate_issues_ics.py

      # commit/push 前に検証する（スケジュール実行は main へ push し ci.yml が起動しないため）。
      - name: Validate generated artifacts
        run: python scripts/validate.py

      - name: Commit if changed
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add docs/github-issues.ics
            git commit -m "Update GitHub Issues ICS"
            git push
          else
            echo "No changes."
          fi

      # ローカル action 参照は checkout 失敗時にロードできないため github-script を直接インライン化。
      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = `⚠️ ワークフロー失敗: ${context.workflow}`;
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              `**${context.workflow}** が失敗しました。`,
              ``,
              `- 実行ログ: ${runUrl}`,
              `- イベント: \`${context.eventName}\``,
              `- 発生時刻: ${new Date().toISOString()}`,
            ].join("\n");
            const { owner, repo } = context.repo;
            const existing = await github.rest.issues.listForRepo({
              owner, repo, state: "open", labels: "ci-failure", per_page: 100,
            });
            const hit = existing.data.find((i) => i.title === title);
            if (hit) {
              await github.rest.issues.createComment({ owner, repo, issue_number: hit.number, body });
              core.notice(`Updated existing failure issue #${hit.number}`);
            } else {
              const created = await github.rest.issues.create({
                owner, repo, title, body, labels: ["ci-failure"],
              });
              core.notice(`Opened failure issue #${created.data.number}`);
            }
