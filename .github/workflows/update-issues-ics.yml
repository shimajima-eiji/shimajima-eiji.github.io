name: Update GitHub Issues ICS

on:
  workflow_dispatch:
  issues:
    types: [opened, edited, closed, reopened]
  schedule:
    # JST 09:00 = UTC 00:00
    - cron: "0 0 * * *"

permissions:
  contents: write
  issues: read

concurrency:
  group: update-issues-ics
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate Issues ICS
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          OUT_DIR: docs
          OUT_FILE: github-issues.ics
        run: python scripts/generate_issues_ics.py

      - name: Commit if changed
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add docs/github-issues.ics
            git commit -m "Update GitHub Issues ICS"
            git push
          else
            echo "No changes."
          fi
